name: Deploy to GitHub Pages

# Explicit workflow rather than relying on the dynamic Pages builder — a dynamic
# build can queue with no jobs and no visible failure (see the sibling saga
# repos' notes). This one is inspectable in Actions, and gates on the smoke
# suite so a broken sim never ships.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke suite
        run: node scripts/smoke.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
