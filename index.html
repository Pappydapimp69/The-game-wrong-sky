<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Wrong Sky</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #05070f; }
    /* Fill the whole field of view — the JS sizes the backing store to the
       viewport (× DPR); CSS just stretches it edge to edge.
       100vh/100vw size to the LARGEST possible mobile-browser viewport (chrome
       collapsed) — on a real phone the visible area is smaller whenever the
       address/tab bar is showing, so a canvas CSS-boxed to 100vh extends below
       the actual fold, pushing anything anchored near the bottom (the on-screen
       touch controls) off screen. 100dvh/100dvw track the ACTUAL visible
       viewport dynamically; declared after vh/vw as a progressive enhancement
       (a browser that doesn't recognize dvh/dvw ignores that declaration and
       keeps the vh/vw fallback, rather than breaking). */
    #game { display: block; width: 100vw; height: 100vh; width: 100dvw; height: 100dvh; touch-action: none; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <!-- Cache-buster: bump this string by hand on any deploy that must be visible
       immediately. NOTE (Brain: the-game-prologue#E8) — this busts ONLY the
       entry file, not its nested relative imports (each a separate cache entry).
       No build step here to rewrite every specifier, so this is a known partial
       mitigation, not a full fix. -->
  <script type="module" src="src/main.js?v=20260707-1"></script>
</body>
</html>
